name: Build and Publish

on:
  push:
    branches: [main, 'feature/*']
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-25.11
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run tests
        run: nix develop -c cargo test --all-features -- --test-threads=1

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build client binary
        run: cargo build --release --bin packet-browser-client --target ${{ matrix.target }}

      - name: Build server binary
        run: cargo build --release --bin packet-browser-server --target ${{ matrix.target }}

      - name: Create release archive
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/packet-browser-client release/
          cp target/${{ matrix.target }}/release/packet-browser-server release/
          cp client/config.example.ini release/
          cp packaging/systemd/packet-browser-client.service release/
          tar -czf packet-browser-${{ matrix.target }}.tar.gz -C release .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packet-browser-${{ matrix.target }}
          path: packet-browser-${{ matrix.target }}.tar.gz

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install OpenSSL
        run: |
          vcpkg install openssl:x64-windows-static
          echo "OPENSSL_DIR=C:\vcpkg\installed\x64-windows-static" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV

      - name: Build client binary
        run: cargo build --release --bin packet-browser-client --target x86_64-pc-windows-msvc

      - name: Build server binary
        run: cargo build --release --bin packet-browser-server --target x86_64-pc-windows-msvc

      - name: Create release archive
        run: |
          mkdir release
          Copy-Item target\x86_64-pc-windows-msvc\release\packet-browser-client.exe release\
          Copy-Item target\x86_64-pc-windows-msvc\release\packet-browser-server.exe release\
          Copy-Item client\config.example.ini release\
          Compress-Archive -Path release\* -DestinationPath packet-browser-x86_64-pc-windows-msvc.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packet-browser-x86_64-pc-windows-msvc
          path: packet-browser-x86_64-pc-windows-msvc.zip

  build-macos:
    needs: test
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: brew install openssl@3 pkg-config

      - name: Build client binary
        run: cargo build --release --bin packet-browser-client --target ${{ matrix.target }}

      - name: Build server binary
        run: cargo build --release --bin packet-browser-server --target ${{ matrix.target }}

      - name: Create release archive
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/packet-browser-client release/
          cp target/${{ matrix.target }}/release/packet-browser-server release/
          cp client/config.example.ini release/
          tar -czf packet-browser-${{ matrix.target }}.tar.gz -C release .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packet-browser-${{ matrix.target }}
          path: packet-browser-${{ matrix.target }}.tar.gz

  build-packages:
    needs: [build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: packet-browser-x86_64-unknown-linux-gnu
          path: artifacts/

      - name: Extract artifacts
        run: |
          mkdir -p extracted
          tar -xzf artifacts/packet-browser-x86_64-unknown-linux-gnu.tar.gz -C extracted/

      - name: Extract package version
        id: version
        run: |
          VERSION=$(grep -m1 '^version' client/Cargo.toml | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build Debian package
        run: |
          mkdir -p deb-build/DEBIAN
          mkdir -p deb-build/usr/bin
          mkdir -p deb-build/etc/packet-browser
          mkdir -p deb-build/lib/systemd/system

          cp extracted/packet-browser-client deb-build/usr/bin/
          cp extracted/config.example.ini deb-build/etc/packet-browser/
          cp extracted/packet-browser-client.service deb-build/lib/systemd/system/

          cat > deb-build/DEBIAN/control << EOF
          Package: packet-browser-client
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: Your Name <your.email@example.com>
          Description: Client component for Packet Browser
           Web browser over AX.25 packet radio
          Depends: libc6, libssl3
          EOF

          dpkg-deb --build deb-build "packet-browser-client_${VERSION}_amd64.deb"

      - name: Build RPM package
        run: |
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp artifacts/packet-browser-x86_64-unknown-linux-gnu.tar.gz rpmbuild/SOURCES/
          cp packaging/rpm/packet-browser-client.spec rpmbuild/SPECS/

          rpmbuild --define "_topdir $(pwd)/rpmbuild" \
                   --define "pkg_version ${VERSION}" \
                   -bb rpmbuild/SPECS/packet-browser-client.spec

          cp rpmbuild/RPMS/x86_64/*.rpm .

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: packet-browser-client-deb
          path: packet-browser-client_${{ env.VERSION }}_amd64.deb

      - name: Upload RPM package
        uses: actions/upload-artifact@v4
        with:
          name: packet-browser-client-rpm
          path: rpmbuild/RPMS/x86_64/*.rpm

  build-docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-25.11
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build Docker image
        run: nix build .#docker-image

      - name: Load image
        run: docker load < result

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Tag and push image
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            docker tag packet-browser:latest "$tag"
            docker push "$tag"
          done

  release:
    needs: [build-linux, build-windows, build-macos, build-packages, build-docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/packet-browser-x86_64-unknown-linux-gnu/packet-browser-x86_64-unknown-linux-gnu.tar.gz
            artifacts/packet-browser-aarch64-unknown-linux-gnu/packet-browser-aarch64-unknown-linux-gnu.tar.gz
            artifacts/packet-browser-x86_64-pc-windows-msvc/packet-browser-x86_64-pc-windows-msvc.zip
            artifacts/packet-browser-x86_64-apple-darwin/packet-browser-x86_64-apple-darwin.tar.gz
            artifacts/packet-browser-aarch64-apple-darwin/packet-browser-aarch64-apple-darwin.tar.gz
            artifacts/packet-browser-client-deb/*.deb
            artifacts/packet-browser-client-rpm/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
