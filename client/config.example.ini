# Packet Browser Client Configuration
# Copy this file to ~/.config/packet-browser/config.ini or /etc/packet-browser/config.ini

[server]
# AGWPE TNC server address and port
agwpe_host = 127.0.0.1
agwpe_port = 8000

[session]
# Your amateur radio callsign
my_callsign = N0CALL

# Target node callsign to connect to
target_callsign = NODE1

# BPQ command to send after connection (e.g., WEB, BBS, etc.)
bpq_command = WEB
